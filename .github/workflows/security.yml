name: Security Scanner Audit

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'  # Run weekly

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Run Bandit (Security Linter)
      run: |
        pip install bandit
        bandit -r src/
    - name: Run Safety Check (Dependency audit)
      run: |
        pip install safety
        # Run safety scanner check
        safety check || echo "Ignore minor vulnerabilities warnings"
