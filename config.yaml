autonomy:
  default_level: manual
  destructive_threshold: 3
  legal_warning: true
  loop_threshold: 10
  max_iterations: 50
  max_level: partial
  no_internet_attack: false
  rate_limit_actions: 100
  require_consent: true
  scope_strict: true
integrations:
  bugcrowd:
    api_key: ''
    enabled: false
  hackerone:
    api_token: ''
    enabled: false
  openbugbounty:
    enabled: false
llm:
  api_key: AIzaSyD5N5G0sfQ3Uc8SP3GI2nFaL3iQm_I4GGg
  base_url: http://localhost:11434
  max_tokens: 4096
  model: gemini-2.0-flash
  provider: gemini
  streaming: false
  temperature: 0.7
logging:
  backup_count: 5
  file: ./logs/redforge.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  max_size: 10485760
memory:
  collection_name: redforge_memory
  persist_dir: ./workspaces
  skill_index: ./skills/skills_index.json
  vector_db: qdrant
security:
  audit_log_enabled: true
  audit_log_file: ./logs/audit.log
  encrypt_workspaces: false
  secure_api_keys: true
tools:
  auto_detect: true
  custom_paths: {}
  install_missing: false
  installation_method: auto
  required_tools:
    android:
    - apktool
    - jadx
    - frida-tools
    bugbounty:
    - nmap
    - sqlmap
    - ffuf
    ctf:
    - pwntools
    - gdb
  timeout: 300
ui:
  color_output: true
  streaming: true
  theme: dark
  verbose: false
web:
  auth_required: true
  debug: false
  host: 127.0.0.1
  port: 5000
  secret_key: ''
workspace:
  auto_save: true
  backup_enabled: true
  default_workspace: default
  retention_days: 90
