apiVersion: v1
kind: ConfigMap
metadata:
  name: redforge-config
data:
  REDFORGE_ENV: "production"
  REDFORGE_REDIS_HOST: "redis-service"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redforge-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: redforge-api
  template:
    metadata:
      labels:
        app: redforge-api
    spec:
      containers:
      - name: api
        image: redforge/api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: redforge-config
---
apiVersion: v1
kind: Service
metadata:
  name: redforge-api-service
spec:
  selector:
    app: redforge-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000
  type: ClusterIP
